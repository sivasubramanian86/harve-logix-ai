AWSTemplateFormatVersion: '2010-09-09'
Description: 'HarveLogix AI - AWS Bedrock Agent with Action Groups'

Parameters:
  AgentName:
    Type: String
    Default: HarveLogixAI
    Description: Name of the Bedrock Agent
  
  FoundationModel:
    Type: String
    Default: anthropic.claude-sonnet-4-20250514
    Description: Bedrock foundation model ID

Resources:
  # IAM Role for Bedrock Agent
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: HarveLogixBedrockAgentRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: InvokeLambdaFunctions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub 'arn:aws:lambda:ap-south-2:${AWS::AccountId}:function:harvelogix-*'

  # Bedrock Agent
  HarveLogixAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Ref AgentName
      AgentResourceRoleArn: !GetAtt BedrockAgentRole.Arn
      FoundationModel: !Ref FoundationModel
      Instruction: |
        You are HarveLogix AI, an intelligent agricultural assistant helping Indian farmers with post-harvest decisions.
        
        You have access to 6 specialized agents:
        1. HarvestReady - Determines optimal harvest timing based on crop phenology, weather, and market prices
        2. StorageScout - Recommends storage methods to minimize waste
        3. SupplyMatch - Matches farmers directly with processors (no middlemen)
        4. WaterWise - Optimizes water usage for post-harvest operations
        5. QualityHub - Assesses crop quality using image analysis
        6. CollectiveVoice - Facilitates farmer aggregation for collective bargaining
        
        When a farmer asks a question:
        - Understand their need (harvest timing, storage, buyer, water, quality, or collective)
        - Route to the appropriate agent
        - Provide clear, actionable recommendations in simple language
        - Always mention expected income impact in rupees
        
        Be helpful, concise, and farmer-friendly.
      IdleSessionTTLInSeconds: 600

  # Action Group: HarvestReady
  HarvestReadyActionGroup:
    Type: AWS::Bedrock::AgentActionGroup
    Properties:
      AgentId: !GetAtt HarveLogixAgent.AgentId
      AgentVersion: DRAFT
      ActionGroupName: HarvestReadyActions
      Description: Actions for optimal harvest timing recommendations
      ActionGroupExecutor:
        Lambda: !Sub 'arn:aws:lambda:ap-south-2:${AWS::AccountId}:function:harvelogix-020513638290-crop-health-analyzer-dev'
      ApiSchema:
        Payload: |
          {
            "openapi": "3.0.0",
            "info": {
              "title": "HarvestReady API",
              "version": "1.0.0",
              "description": "API for harvest timing recommendations"
            },
            "paths": {
              "/analyze-harvest": {
                "post": {
                  "summary": "Analyze optimal harvest timing",
                  "description": "Determines the best date and time to harvest based on crop maturity, weather, and market conditions",
                  "operationId": "analyzeHarvestTiming",
                  "requestBody": {
                    "required": true,
                    "content": {
                      "application/json": {
                        "schema": {
                          "type": "object",
                          "required": ["crop_type", "growth_stage"],
                          "properties": {
                            "crop_type": {
                              "type": "string",
                              "description": "Type of crop (e.g., tomato, onion, capsicum)"
                            },
                            "growth_stage": {
                              "type": "integer",
                              "description": "Current growth stage from 0-10",
                              "minimum": 0,
                              "maximum": 10
                            },
                            "location": {
                              "type": "object",
                              "properties": {
                                "latitude": {"type": "number"},
                                "longitude": {"type": "number"}
                              }
                            }
                          }
                        }
                      }
                    }
                  },
                  "responses": {
                    "200": {
                      "description": "Harvest recommendation",
                      "content": {
                        "application/json": {
                          "schema": {
                            "type": "object",
                            "properties": {
                              "harvest_date": {"type": "string"},
                              "harvest_time": {"type": "string"},
                              "expected_income_gain_rupees": {"type": "number"},
                              "reasoning": {"type": "string"},
                              "confidence_score": {"type": "number"}
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }

  # Agent Alias
  HarveLogixAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !GetAtt HarveLogixAgent.AgentId
      AgentAliasName: production
      Description: Production alias for HarveLogix AI Agent

Outputs:
  AgentId:
    Description: Bedrock Agent ID
    Value: !GetAtt HarveLogixAgent.AgentId
    Export:
      Name: !Sub '${AWS::StackName}-AgentId'
  
  AgentArn:
    Description: Bedrock Agent ARN
    Value: !GetAtt HarveLogixAgent.AgentArn
    Export:
      Name: !Sub '${AWS::StackName}-AgentArn'
  
  AgentAliasId:
    Description: Agent Alias ID
    Value: !GetAtt HarveLogixAgentAlias.AgentAliasId
    Export:
      Name: !Sub '${AWS::StackName}-AgentAliasId'
  
  ConsoleUrl:
    Description: AWS Console URL for the agent
    Value: !Sub 'https://us-east-1.console.aws.amazon.com/bedrock/home?region=us-east-1#/agents/${HarveLogixAgent.AgentId}'
