AWSTemplateFormatVersion: '2010-09-09'
Description: 'HarveLogix AI - API Gateway HTTPS Proxy to EC2 Backend'

Parameters:
  Environment:
    Type: String
    Default: prod
    Description: Environment name
  
  Ec2IpAddress:
    Type: String
    Default: '18.60.156.250'
    Description: 'Public IP address of the EC2 backend server'

Resources:
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'harvelogix-api-${Environment}'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - '*'
        AllowHeaders:
          - '*'

  ProxyIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationUri: !Sub 'http://${Ec2IpAddress}:5000/{proxy}'
      IntegrationMethod: ANY
      PayloadFormatVersion: '1.0'

  RootIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationUri: !Sub 'http://${Ec2IpAddress}:5000/'
      IntegrationMethod: ANY
      PayloadFormatVersion: '1.0'

  ProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /{proxy+}'
      Target: !Sub 'integrations/${ProxyIntegration}'

  RootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /'
      Target: !Sub 'integrations/${RootIntegration}'

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref Environment
      AutoDeploy: true

Outputs:
  ApiUrl:
    Description: "The HTTPS URL for the API Gateway"
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
