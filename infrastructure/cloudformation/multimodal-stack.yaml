AWSTemplateFormatVersion: '2010-09-09'
Description: 'HarveLogix Multimodal AI Scanner - Complete Infrastructure Stack with EC2, RDS, Lambda, and Bedrock'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  AppName:
    Type: String
    Default: harvelogix
    Description: Application name

  EnableMultimodalServices:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable multimodal services invocation

  EnableRDS:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable RDS Aurora PostgreSQL database

  EnableEC2:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable EC2 instance for backend deployment

  EC2InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type (t3.micro is free tier eligible)

Resources:
  # ============================================================================
  # S3 BUCKET FOR MULTIMODAL MEDIA
  # ============================================================================
  
  MultimodalMediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AppName}-multimodal-${Environment}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldScans
            Status: Enabled
            ExpirationInDays: 90
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  # ============================================================================
  # DYNAMODB TABLES FOR MULTIMODAL SCANS
  # ============================================================================

  MultimodalScansTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AppName}-multimodal-scans-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: scan_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: farmer_id
          AttributeType: S
        - AttributeName: scan_type
          AttributeType: S
      KeySchema:
        - AttributeName: scan_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: farmer_id-timestamp-index
          KeySchema:
            - AttributeName: farmer_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: scan_type-timestamp-index
          KeySchema:
            - AttributeName: scan_type
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  ScanAggregationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AppName}-scan-aggregations-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: aggregation_id
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: region
          AttributeType: S
      KeySchema:
        - AttributeName: aggregation_id
          KeyType: HASH
        - AttributeName: date
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: region-date-index
          KeySchema:
            - AttributeName: region
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  # ============================================================================
  # IAM ROLE FOR LAMBDA MULTIMODAL FUNCTIONS
  # ============================================================================

  LambdaMultimodalRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AppName}-lambda-multimodal-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:Query'
                  - 'dynamodb:Scan'
                Resource:
                  - !GetAtt MultimodalScansTable.Arn
                  - !Sub '${MultimodalScansTable.Arn}/index/*'
                  - !GetAtt ScanAggregationsTable.Arn
                  - !Sub '${ScanAggregationsTable.Arn}/index/*'
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                Resource: '*'
        - PolicyName: RekognitionAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'rekognition:DetectLabels'
                  - 'rekognition:DetectText'
                  - 'rekognition:DetectFaces'
                Resource: '*'
        - PolicyName: TranscribeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'transcribe:StartTranscriptionJob'
                  - 'transcribe:GetTranscriptionJob'
                Resource: '*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                Resource: !Sub '${MultimodalMediaBucket.Arn}/*'
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  # ============================================================================
  # RDS AURORA POSTGRESQL DATABASE
  # ============================================================================

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: IsRDSEnabled
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS Aurora
      SubnetIds:
        - !Ref PrivateSubnet1RDS
        - !Ref PrivateSubnet2RDS
      Tags:
        - Key: Service
          Value: Database
        - Key: CostCenter
          Value: Multimodal-AI

  PrivateSubnet1RDS:
    Type: AWS::EC2::Subnet
    Condition: IsRDSEnabled
    Properties:
      VpcId: !Ref VPCRDS
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-private-subnet-1-rds-${Environment}'

  PrivateSubnet2RDS:
    Type: AWS::EC2::Subnet
    Condition: IsRDSEnabled
    Properties:
      VpcId: !Ref VPCRDS
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-private-subnet-2-rds-${Environment}'

  VPCRDS:
    Type: AWS::EC2::VPC
    Condition: IsRDSEnabled
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-vpc-rds-${Environment}'

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsRDSEnabled
    Properties:
      GroupDescription: Security group for RDS Aurora
      VpcId: !Ref VPCRDS
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
          Description: PostgreSQL access
      Tags:
        - Key: Service
          Value: Database

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Condition: IsRDSEnabled
    Properties:
      Engine: aurora-postgresql
      EngineVersion: '15.2'
      DatabaseName: harvelogix
      MasterUsername: postgres
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 1
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'
      EnableCloudwatchLogsExports:
        - postgresql
      StorageEncrypted: false
      EnableIAMDatabaseAuthentication: false
      EnableHttpEndpoint: true
      Tags:
        - Key: Service
          Value: Database
        - Key: CostCenter
          Value: Multimodal-AI

  AuroraDBInstance:
    Type: AWS::RDS::DBInstance
    Condition: IsRDSEnabled
    Properties:
      DBInstanceIdentifier: !Sub '${AppName}-aurora-${Environment}'
      DBInstanceClass: db.t3.micro
      Engine: aurora-postgresql
      DBClusterIdentifier: !Ref AuroraDBCluster
      PubliclyAccessible: false
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt RDSMonitoringRole.Arn
      Tags:
        - Key: Service
          Value: Database

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Condition: IsRDSEnabled
    Properties:
      Name: !Sub '${AppName}/rds/password'
      GenerateSecretString:
        SecretStringTemplate: '{"username": "postgres"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  RDSMonitoringRole:
    Type: AWS::IAM::Role
    Condition: IsRDSEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole'

  # ============================================================================
  # VPC AND NETWORKING FOR EC2 AND RDS
  # ============================================================================

  VPC:
    Type: AWS::EC2::VPC
    Condition: IsEC2Enabled
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-vpc-${Environment}'

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Condition: IsEC2Enabled
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-public-subnet-1-${Environment}'

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Condition: IsEC2Enabled
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-private-subnet-1-${Environment}'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Condition: IsEC2Enabled
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-private-subnet-2-${Environment}'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: IsEC2Enabled
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-igw-${Environment}'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: IsEC2Enabled
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: IsEC2Enabled
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-public-rt-${Environment}'

  PublicRoute:
    Type: AWS::EC2::Route
    Condition: IsEC2Enabled
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsEC2Enabled
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # ============================================================================
  # EC2 INSTANCE FOR BACKEND DEPLOYMENT
  # ============================================================================

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsEC2Enabled
    Properties:
      GroupDescription: Security group for EC2 backend instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0
          Description: Backend API
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0
          Description: Frontend
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-ec2-sg-${Environment}'

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsEC2Enabled
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-lambda-sg-${Environment}'

  EC2IAMRole:
    Type: AWS::IAM::Role
    Condition: IsEC2Enabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy'
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                Resource: !Sub '${MultimodalMediaBucket.Arn}/*'
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                Resource: '*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:Query'
                Resource:
                  - !GetAtt MultimodalScansTable.Arn
                  - !Sub '${MultimodalScansTable.Arn}/index/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: IsEC2Enabled
    Properties:
      Roles:
        - !Ref EC2IAMRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Condition: IsEC2Enabled
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref EC2InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y nodejs npm git
          
          # Clone repository
          cd /home/ec2-user
          git clone https://github.com/yourusername/harvelogix-ai.git
          cd harvelogix-ai/backend
          
          # Install dependencies
          npm install
          
          # Set environment variables
          cat > .env << EOF
          NODE_ENV=production
          PORT=5000
          AWS_REGION=ap-south-1
          BEDROCK_MODEL_ID=anthropic.claude-sonnet-4-20250514
          MULTIMODAL_SCANS_TABLE=${MultimodalScansTable}
          S3_BUCKET=${MultimodalMediaBucket}
          ENABLE_MULTIMODAL_SERVICES=${EnableMultimodalServices}
          EOF
          
          # Start backend server
          npm start &
          
          # Start frontend
          cd ../web-dashboard
          npm install
          npm run build
          npx serve -s dist -l 3000 &
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-backend-${Environment}'
        - Key: Service
          Value: Backend
        - Key: CostCenter
          Value: Multimodal-AI

  CropHealthAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-crop-health-analyzer-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 10, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-20250514
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Crop health analyzer deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Analysis complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  IrrigationAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-irrigation-analyzer-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 10, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-20250514
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Irrigation analyzer deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Analysis complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  WeatherAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-weather-analyzer-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 10, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-20250514
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Weather analyzer deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Analysis complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  VoiceQueryProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-voice-query-processor-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 10, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-20250514
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Voice query processor deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Processing complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  VideoAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-video-analyzer-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 300
      MemorySize: 1024
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 5, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-20250514
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Video analyzer deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Video analysis complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  # ============================================================================
  # CLOUDWATCH LOG GROUPS
  # ============================================================================

  CropHealthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-crop-health-analyzer-${Environment}'
      RetentionInDays: 30

  IrrigationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-irrigation-analyzer-${Environment}'
      RetentionInDays: 30

  WeatherLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-weather-analyzer-${Environment}'
      RetentionInDays: 30

  VoiceQueryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-voice-query-processor-${Environment}'
      RetentionInDays: 30

  VideoLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-video-analyzer-${Environment}'
      RetentionInDays: 30

  # ============================================================================
  # CLOUDWATCH ALARMS
  # ============================================================================

  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AppName}-lambda-errors-${Environment}'
      AlarmDescription: Alert when Lambda functions have errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  DynamoDBThrottlingAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AppName}-dynamodb-throttling-${Environment}'
      AlarmDescription: Alert when DynamoDB is throttled
      MetricName: ConsumedWriteCapacityUnits
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Conditions:
  IsInvocationEnabled: !Equals [!Ref EnableMultimodalServices, 'true']
  IsRDSEnabled: !Equals [!Ref EnableRDS, 'true']
  IsEC2Enabled: !Equals [!Ref EnableEC2, 'true']

Outputs:
  MultimodalS3Bucket:
    Description: S3 bucket for multimodal media storage
    Value: !Ref MultimodalMediaBucket
    Export:
      Name: !Sub '${AppName}-multimodal-bucket-${Environment}'

  MultimodalScansTable:
    Description: DynamoDB table for multimodal scans
    Value: !Ref MultimodalScansTable
    Export:
      Name: !Sub '${AppName}-scans-table-${Environment}'

  ScanAggregationsTable:
    Description: DynamoDB table for scan aggregations
    Value: !Ref ScanAggregationsTable
    Export:
      Name: !Sub '${AppName}-aggregations-table-${Environment}'

  CropHealthLambdaArn:
    Description: ARN of crop health analyzer Lambda function
    Value: !GetAtt CropHealthAnalyzerFunction.Arn
    Export:
      Name: !Sub '${AppName}-crop-health-lambda-${Environment}'

  IrrigationLambdaArn:
    Description: ARN of irrigation analyzer Lambda function
    Value: !GetAtt IrrigationAnalyzerFunction.Arn
    Export:
      Name: !Sub '${AppName}-irrigation-lambda-${Environment}'

  WeatherLambdaArn:
    Description: ARN of weather analyzer Lambda function
    Value: !GetAtt WeatherAnalyzerFunction.Arn
    Export:
      Name: !Sub '${AppName}-weather-lambda-${Environment}'

  VoiceQueryLambdaArn:
    Description: ARN of voice query processor Lambda function
    Value: !GetAtt VoiceQueryProcessorFunction.Arn
    Export:
      Name: !Sub '${AppName}-voice-query-lambda-${Environment}'

  VideoAnalyzerLambdaArn:
    Description: ARN of video analyzer Lambda function
    Value: !GetAtt VideoAnalyzerFunction.Arn
    Export:
      Name: !Sub '${AppName}-video-analyzer-lambda-${Environment}'

  EnableMultimodalServices:
    Description: Whether multimodal services are enabled for invocation
    Value: !Ref EnableMultimodalServices
    Export:
      Name: !Sub '${AppName}-enable-services-${Environment}'

  EC2InstanceId:
    Condition: IsEC2Enabled
    Description: EC2 instance ID for backend deployment
    Value: !Ref EC2Instance
    Export:
      Name: !Sub '${AppName}-ec2-instance-${Environment}'

  EC2PublicIP:
    Condition: IsEC2Enabled
    Description: Public IP address of EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: !Sub '${AppName}-ec2-public-ip-${Environment}'

  RDSEndpoint:
    Condition: IsRDSEnabled
    Description: RDS Aurora PostgreSQL endpoint
    Value: !GetAtt AuroraDBCluster.Endpoint.Address
    Export:
      Name: !Sub '${AppName}-rds-endpoint-${Environment}'

  RDSPort:
    Condition: IsRDSEnabled
    Description: RDS Aurora PostgreSQL port
    Value: !GetAtt AuroraDBCluster.Endpoint.Port
    Export:
      Name: !Sub '${AppName}-rds-port-${Environment}'

  DBSecretArn:
    Condition: IsRDSEnabled
    Description: ARN of RDS database password secret
    Value: !Ref DBSecret
    Export:
      Name: !Sub '${AppName}-db-secret-${Environment}'
