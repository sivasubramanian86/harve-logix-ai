AWSTemplateFormatVersion: '2010-09-09'
Description: 'HarveLogix RAG + OpenSearch k-NN Vector Store Infrastructure'

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name (dev, staging, prod)
  
  DomainName:
    Type: String
    Default: harvelogix-vectors
    Description: OpenSearch domain name
  
  InstanceType:
    Type: String
    Default: t3.small.search
    Description: OpenSearch instance type
  
  InstanceCount:
    Type: Number
    Default: 2
    Description: Number of instances

Resources:
  # OpenSearch Domain for vector search
  OpenSearchDomain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: !Sub '${DomainName}-${EnvironmentName}'
      EngineVersion: OpenSearch_2.11
      DomainEndpointOptions:
        EnforceHTTPS: true
        TLSSecurityPolicy: Policy-Min-TLS-1-2-2019-07
      NodeToNodeEncryptionOptions:
        Enabled: true
      EncryptionAtRestOptions:
        Enabled: true
      EBSOptions:
        EBSEnabled: true
        VolumeType: gp3
        VolumeSize: 100
      ElasticsearchClusterConfig:
        InstanceType: !Ref InstanceType
        InstanceCount: !Ref InstanceCount
        DedicatedMasterEnabled: false
      AccessPolicies:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt EmbeddingLambdaRole.Arn
            Action: 'es:*'
            Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${DomainName}-${EnvironmentName}/*'
          - Effect: Allow
            Principal:
              AWS: !GetAtt RetrieverLambdaRole.Arn
            Action: 'es:*'
            Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${DomainName}-${EnvironmentName}/*'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: HarveLogix

  # Lambda Execution Role for Embedding Ingestion
  EmbeddingLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:ListBucket'
                Resource:
                  - !Sub '${IngestionBucket.Arn}'
                  - !Sub '${IngestionBucket.Arn}/*'
        - PolicyName: OpenSearchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'es:ESHttpPut'
                  - 'es:ESHttpPost'
                Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${DomainName}-${EnvironmentName}/*'

  # Lambda Execution Role for Retriever
  RetrieverLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2*'
        - PolicyName: OpenSearchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'es:ESHttpGet'
                  - 'es:ESHttpPost'
                Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${DomainName}-${EnvironmentName}/*'

  # S3 Bucket for ingestion source documents
  IngestionBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'harvelogix-rag-ingestion-${AWS::AccountId}-${EnvironmentName}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # SNS Topic for RAG events
  RAGEventTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'harvelogix-rag-events-${EnvironmentName}'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # EventBridge Rule for MCP orchestration
  MCPOrchestrationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'harvelogix-mcp-orchestration-${EnvironmentName}'
      Description: Orchestrates multi-agent workflows
      EventPattern:
        source:
          - harvelogix.agents
        detail-type:
          - agent.task.initiated
          - agent.task.completed
      State: ENABLED
      Targets:
        - Arn: !GetAtt MCPOrchestratorQueue.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

  # SQS Queue for task orchestration
  MCPOrchestratorQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'harvelogix-mcp-orchestrator-${EnvironmentName}'
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # EventBridge Role
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: SQSSendMessage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sqs:SendMessage'
                Resource: !GetAtt MCPOrchestratorQueue.Arn

  # DynamoDB Table for agent state/context
  AgentStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'harvelogix-agent-state-${EnvironmentName}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: agent_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  OpenSearchDomainEndpoint:
    Description: OpenSearch Domain Endpoint
    Value: !GetAtt OpenSearchDomain.DomainEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-OpenSearchEndpoint'

  IngestionBucketName:
    Description: S3 Bucket for document ingestion
    Value: !Ref IngestionBucket
    Export:
      Name: !Sub '${AWS::StackName}-IngestionBucket'

  RAGEventTopicArn:
    Description: SNS Topic for RAG events
    Value: !Ref RAGEventTopic
    Export:
      Name: !Sub '${AWS::StackName}-RAGEventTopic'

  MCPOrchestratorQueueUrl:
    Description: SQS Queue for MCP orchestration
    Value: !Ref MCPOrchestratorQueue
    Export:
      Name: !Sub '${AWS::StackName}-MCPQueue'

  AgentStateTableName:
    Description: DynamoDB table for agent state
    Value: !Ref AgentStateTable
    Export:
      Name: !Sub '${AWS::StackName}-AgentStateTable'
