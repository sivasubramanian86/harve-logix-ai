AWSTemplateFormatVersion: '2010-09-09'
Description: 'HarveLogix AI - Bedrock Agents Deployment'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

Resources:
  # IAM Role for Bedrock Agent
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:harvelogix-*

  # Lambda Layer for shared dependencies
  AgentDependenciesLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: harvelogix-agent-dependencies
      Description: Shared dependencies for HarveLogix agents
      Content:
        S3Bucket: !Sub harvelogix-020513638290-multimodal-dev-020513638290
        S3Key: layers/agent-dependencies.zip
      CompatibleRuntimes:
        - python3.11

  # Deploy agents to existing Lambda functions
  UpdateCropHealthFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: harvelogix-020513638290-crop-health-analyzer-dev
      Runtime: python3.11
      Handler: harvest_ready_agent.lambda_handler
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/harvelogix-lambda-role
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-20250514
          AWS_REGION: ap-south-2
          PROCESSOR_PROFILES_TABLE: harvelogix-processors-production
      Code:
        ZipFile: |
          # Placeholder - will be updated with actual code
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Agent deployed'}

Outputs:
  BedrockAgentRoleArn:
    Value: !GetAtt BedrockAgentRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-BedrockAgentRole
