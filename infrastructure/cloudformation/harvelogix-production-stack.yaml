AWSTemplateFormatVersion: '2010-09-09'
Description: 'HarveLogix AI - Production Stack (All Core Services)'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
  
  BedrockModelId:
    Type: String
    Default: anthropic.claude-sonnet-4-20250514
    Description: Bedrock model ID for AI agents

Resources:
  # S3 Buckets
  MultimodalBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub harvelogix-multimodal-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: MoveToGlacierAfter1Year
            Status: Enabled
            Transitions:
              - TransitionInDays: 365
                StorageClass: GLACIER

  ModelsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub harvelogix-models-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  # DynamoDB Tables
  FarmersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub harvelogix-farmers-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: farmer_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
        - AttributeName: crop_type
          AttributeType: S
      KeySchema:
        - AttributeName: farmer_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: CropTypeIndex
          KeySchema:
            - AttributeName: crop_type
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  AgentDecisionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub harvelogix-agent-decisions-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: farmer_id
          AttributeType: S
        - AttributeName: decision_timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: farmer_id
          KeyType: HASH
        - AttributeName: decision_timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub harvelogix-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt FarmersTable.Arn
                  - !GetAtt AgentDecisionsTable.Arn
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub ${MultimodalBucket.Arn}/*
                  - !Sub ${ModelsBucket.Arn}/*
        - PolicyName: TranscribeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - transcribe:StartTranscriptionJob
                  - transcribe:GetTranscriptionJob
                Resource: '*'
        - PolicyName: RekognitionAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - rekognition:DetectLabels
                  - rekognition:DetectModerationLabels
                Resource: '*'

  # Lambda Functions
  CropHealthFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub harvelogix-crop-health-${Environment}
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          FARMERS_TABLE: !Ref FarmersTable
          DECISIONS_TABLE: !Ref AgentDecisionsTable
          S3_BUCKET: !Ref MultimodalBucket
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime
          
          bedrock = boto3.client('bedrock-runtime')
          dynamodb = boto3.resource('dynamodb')
          
          def handler(event, context):
              # Placeholder - implement crop health logic
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'Crop health analysis',
                      'timestamp': datetime.now().isoformat()
                  })
              }

  IrrigationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub harvelogix-irrigation-${Environment}
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          FARMERS_TABLE: !Ref FarmersTable
          DECISIONS_TABLE: !Ref AgentDecisionsTable
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime
          
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'Irrigation analysis',
                      'timestamp': datetime.now().isoformat()
                  })
              }

  WeatherFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub harvelogix-weather-${Environment}
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          FARMERS_TABLE: !Ref FarmersTable
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime
          
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'Weather analysis',
                      'timestamp': datetime.now().isoformat()
                  })
              }

  VoiceQueryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub harvelogix-voice-query-${Environment}
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          S3_BUCKET: !Ref MultimodalBucket
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime
          
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'Voice query processed',
                      'timestamp': datetime.now().isoformat()
                  })
              }

  VideoScanFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub harvelogix-video-scan-${Environment}
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 2048
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          S3_BUCKET: !Ref MultimodalBucket
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime
          
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': 'Video scan analysis',
                      'timestamp': datetime.now().isoformat()
                  })
              }

  # API Gateway
  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub harvelogix-api-${Environment}
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - '*'

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: !Ref Environment
      AutoDeploy: true

  # CloudWatch Log Groups
  CropHealthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/harvelogix-crop-health-${Environment}
      RetentionInDays: 30

  IrrigationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/harvelogix-irrigation-${Environment}
      RetentionInDays: 30

  WeatherLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/harvelogix-weather-${Environment}
      RetentionInDays: 30

  VoiceQueryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/harvelogix-voice-query-${Environment}
      RetentionInDays: 30

  VideoScanLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/harvelogix-video-scan-${Environment}
      RetentionInDays: 30

Outputs:
  MultimodalBucketName:
    Value: !Ref MultimodalBucket
    Export:
      Name: !Sub ${AWS::StackName}-MultimodalBucket
  
  ModelsBucketName:
    Value: !Ref ModelsBucket
    Export:
      Name: !Sub ${AWS::StackName}-ModelsBucket
  
  FarmersTableName:
    Value: !Ref FarmersTable
    Export:
      Name: !Sub ${AWS::StackName}-FarmersTable
  
  AgentDecisionsTableName:
    Value: !Ref AgentDecisionsTable
    Export:
      Name: !Sub ${AWS::StackName}-AgentDecisionsTable
  
  ApiEndpoint:
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint
  
  LambdaRoleArn:
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-LambdaRoleArn
