AWSTemplateFormatVersion: '2010-09-09'
Description: 'HarveLogix RDS Aurora PostgreSQL Database'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  AppName:
    Type: String
    Default: harvelogix
    Description: Application name

Resources:
  # VPC for RDS
  VPCRDS:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.1.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-vpc-rds-${Environment}'

  # Private Subnets for RDS
  PrivateSubnet1RDS:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPCRDS
      CidrBlock: 10.1.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-private-subnet-1-rds-${Environment}'

  PrivateSubnet2RDS:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPCRDS
      CidrBlock: 10.1.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-private-subnet-2-rds-${Environment}'

  # DB Subnet Group
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS Aurora
      SubnetIds:
        - !Ref PrivateSubnet1RDS
        - !Ref PrivateSubnet2RDS
      Tags:
        - Key: Service
          Value: Database
        - Key: CostCenter
          Value: Multimodal-AI

  # Security Group for RDS
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS Aurora
      VpcId: !Ref VPCRDS
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
          Description: PostgreSQL access
      Tags:
        - Key: Service
          Value: Database

  # Secrets Manager for RDS Password
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AppName}/rds/password-${Environment}'
      GenerateSecretString:
        SecretStringTemplate: '{"username": "postgres"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  # RDS PostgreSQL Database (Standard, not Aurora)
  PostgreSQLDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${AppName}-postgres-${Environment}'
      Engine: postgres
      EngineVersion: '15.3'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp2
      MasterUsername: postgres
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref RDSSecurityGroup
      DBName: harvelogix
      BackupRetentionPeriod: 1
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'
      EnableCloudwatchLogsExports:
        - postgresql
      StorageEncrypted: false
      PubliclyAccessible: false
      Tags:
        - Key: Service
          Value: Database
        - Key: CostCenter
          Value: Multimodal-AI

  # IAM Role for RDS Monitoring
  RDSMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole'

Outputs:
  RDSEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt PostgreSQLDatabase.Endpoint.Address
    Export:
      Name: !Sub '${AppName}-rds-endpoint-${Environment}'

  RDSPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt PostgreSQLDatabase.Endpoint.Port
    Export:
      Name: !Sub '${AppName}-rds-port-${Environment}'

  DBSecretArn:
    Description: ARN of RDS database password secret
    Value: !Ref DBSecret
    Export:
      Name: !Sub '${AppName}-db-secret-${Environment}'

  RDSInstanceIdentifier:
    Description: RDS Instance Identifier
    Value: !Ref PostgreSQLDatabase
    Export:
      Name: !Sub '${AppName}-rds-instance-${Environment}'

  DatabaseName:
    Description: Database Name
    Value: harvelogix
    Export:
      Name: !Sub '${AppName}-db-name-${Environment}'

  MasterUsername:
    Description: Master Username
    Value: postgres
    Export:
      Name: !Sub '${AppName}-db-user-${Environment}'
