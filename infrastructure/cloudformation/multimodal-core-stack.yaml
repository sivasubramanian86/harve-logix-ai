AWSTemplateFormatVersion: '2010-09-09'
Description: 'HarveLogix Multimodal AI Scanner - Core Stack (Lambda, S3, DynamoDB)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  AppName:
    Type: String
    Default: harvelogix
    Description: Application name

  EnableMultimodalServices:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable multimodal services invocation

Resources:
  # ============================================================================
  # S3 BUCKET FOR MULTIMODAL MEDIA
  # ============================================================================
  
  MultimodalMediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AppName}-multimodal-${Environment}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldScans
            Status: Enabled
            ExpirationInDays: 90
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  # ============================================================================
  # DYNAMODB TABLES FOR MULTIMODAL SCANS
  # ============================================================================

  MultimodalScansTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AppName}-multimodal-scans-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: scan_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: farmer_id
          AttributeType: S
        - AttributeName: scan_type
          AttributeType: S
      KeySchema:
        - AttributeName: scan_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: farmer_id-timestamp-index
          KeySchema:
            - AttributeName: farmer_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: scan_type-timestamp-index
          KeySchema:
            - AttributeName: scan_type
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  ScanAggregationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AppName}-scan-aggregations-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: aggregation_id
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: region
          AttributeType: S
      KeySchema:
        - AttributeName: aggregation_id
          KeyType: HASH
        - AttributeName: date
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: region-date-index
          KeySchema:
            - AttributeName: region
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  # ============================================================================
  # IAM ROLE FOR LAMBDA MULTIMODAL FUNCTIONS
  # ============================================================================

  LambdaMultimodalRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AppName}-lambda-multimodal-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'dynamodb:GetItem'
                  - 'dynamodb:PutItem'
                  - 'dynamodb:UpdateItem'
                  - 'dynamodb:Query'
                  - 'dynamodb:Scan'
                Resource:
                  - !GetAtt MultimodalScansTable.Arn
                  - !Sub '${MultimodalScansTable.Arn}/index/*'
                  - !GetAtt ScanAggregationsTable.Arn
                  - !Sub '${ScanAggregationsTable.Arn}/index/*'
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                Resource: '*'
        - PolicyName: RekognitionAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'rekognition:DetectLabels'
                  - 'rekognition:DetectText'
                  - 'rekognition:DetectFaces'
                Resource: '*'
        - PolicyName: TranscribeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'transcribe:StartTranscriptionJob'
                  - 'transcribe:GetTranscriptionJob'
                Resource: '*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                Resource: !Sub '${MultimodalMediaBucket.Arn}/*'
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  # ============================================================================
  # LAMBDA FUNCTIONS FOR MULTIMODAL ANALYSIS
  # ============================================================================

  CropHealthAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-crop-health-analyzer-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 10, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: arn:aws:bedrock:ap-south-1:020513638290:application-inference-profile/hs79u71flmnc
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Crop health analyzer deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Analysis complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  IrrigationAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-irrigation-analyzer-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 10, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: arn:aws:bedrock:ap-south-1:020513638290:application-inference-profile/hs79u71flmnc
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Irrigation analyzer deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Analysis complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  WeatherAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-weather-analyzer-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 10, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: arn:aws:bedrock:ap-south-1:020513638290:application-inference-profile/hs79u71flmnc
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Weather analyzer deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Analysis complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  VoiceQueryProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-voice-query-processor-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 60
      MemorySize: 512
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 10, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: arn:aws:bedrock:ap-south-1:020513638290:application-inference-profile/hs79u71flmnc
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Voice query processor deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Processing complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  VideoAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AppName}-video-analyzer-${Environment}'
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt LambdaMultimodalRole.Arn
      Timeout: 300
      MemorySize: 1024
      ReservedConcurrentExecutions: !If [IsInvocationEnabled, 5, 0]
      Environment:
        Variables:
          BEDROCK_MODEL_ID: arn:aws:bedrock:ap-south-1:020513638290:application-inference-profile/hs79u71flmnc
          MULTIMODAL_SCANS_TABLE: !Ref MultimodalScansTable
          S3_BUCKET: !Ref MultimodalMediaBucket
          ENABLE_INVOCATION: !Ref EnableMultimodalServices
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const enableInvocation = process.env.ENABLE_INVOCATION === 'true';
            if (!enableInvocation) {
              return {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Video analyzer deployed but invocations disabled',
                  status: 'disabled'
                })
              };
            }
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Video analysis complete' })
            };
          };
      Tags:
        - Key: Service
          Value: Multimodal
        - Key: CostCenter
          Value: Multimodal-AI

  # ============================================================================
  # CLOUDWATCH LOG GROUPS
  # ============================================================================

  CropHealthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-crop-health-analyzer-${Environment}'
      RetentionInDays: 30

  IrrigationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-irrigation-analyzer-${Environment}'
      RetentionInDays: 30

  WeatherLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-weather-analyzer-${Environment}'
      RetentionInDays: 30

  VoiceQueryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-voice-query-processor-${Environment}'
      RetentionInDays: 30

  VideoLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AppName}-video-analyzer-${Environment}'
      RetentionInDays: 30

  # ============================================================================
  # CLOUDWATCH ALARMS
  # ============================================================================

  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AppName}-lambda-errors-${Environment}'
      AlarmDescription: Alert when Lambda functions have errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  DynamoDBThrottlingAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AppName}-dynamodb-throttling-${Environment}'
      AlarmDescription: Alert when DynamoDB is throttled
      MetricName: ConsumedWriteCapacityUnits
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Conditions:
  IsInvocationEnabled: !Equals [!Ref EnableMultimodalServices, 'true']

Outputs:
  MultimodalS3Bucket:
    Description: S3 bucket for multimodal media storage
    Value: !Ref MultimodalMediaBucket
    Export:
      Name: !Sub '${AppName}-multimodal-bucket-${Environment}'

  MultimodalScansTable:
    Description: DynamoDB table for multimodal scans
    Value: !Ref MultimodalScansTable
    Export:
      Name: !Sub '${AppName}-scans-table-${Environment}'

  ScanAggregationsTable:
    Description: DynamoDB table for scan aggregations
    Value: !Ref ScanAggregationsTable
    Export:
      Name: !Sub '${AppName}-aggregations-table-${Environment}'

  CropHealthLambdaArn:
    Description: ARN of crop health analyzer Lambda function
    Value: !GetAtt CropHealthAnalyzerFunction.Arn
    Export:
      Name: !Sub '${AppName}-crop-health-lambda-${Environment}'

  IrrigationLambdaArn:
    Description: ARN of irrigation analyzer Lambda function
    Value: !GetAtt IrrigationAnalyzerFunction.Arn
    Export:
      Name: !Sub '${AppName}-irrigation-lambda-${Environment}'

  WeatherLambdaArn:
    Description: ARN of weather analyzer Lambda function
    Value: !GetAtt WeatherAnalyzerFunction.Arn
    Export:
      Name: !Sub '${AppName}-weather-lambda-${Environment}'

  VoiceQueryLambdaArn:
    Description: ARN of voice query processor Lambda function
    Value: !GetAtt VoiceQueryProcessorFunction.Arn
    Export:
      Name: !Sub '${AppName}-voice-query-lambda-${Environment}'

  VideoAnalyzerLambdaArn:
    Description: ARN of video analyzer Lambda function
    Value: !GetAtt VideoAnalyzerFunction.Arn
    Export:
      Name: !Sub '${AppName}-video-analyzer-lambda-${Environment}'

  EnableMultimodalServices:
    Description: Whether multimodal services are enabled for invocation
    Value: !Ref EnableMultimodalServices
    Export:
      Name: !Sub '${AppName}-enable-services-${Environment}'
